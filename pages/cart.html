<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - R&R Hub</title>

<link rel="stylesheet" href="../assets/css/style.css">
<script src="../assets/js/script.js" defer></script>
</head>

<body>

<header>
<h1>R&R Hub</h1>
<p>Your Shopping Cart</p>
</header>

<nav>
<a href="../index.html">Home</a>
<a href="electronics.html">Electronics</a>
<a href="fashion.html">Fashion</a>
<a href="home-kitchen.html">Home & Kitchen</a>
</nav>

<section class="products">

<h2>🛒 Your Cart Items</h2>

<div id="cart-items">
<p>No items added yet.</p>
</div>

<h3 id="total">Total: ₹0</h3>

<button onclick="alert('Order Placed Successfully! 🎉')">
Checkout Now
</button>

</section>

<footer>
<p>© 2026 R&R Hub</p>
</footer>
<script>
function loadCart(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let container = document.getElementById("cart-items");
    let total = 0;

    if(cart.length === 0){
        container.innerHTML = "<p>No items added yet.</p>";
        return;
    }

    container.innerHTML = "";

    cart.forEach((item, index) => {
    total += item.price;

    container.innerHTML += `
    <div class="product-card">
        <h3>${item.name}</h3>
        <p>₹${item.price}</p>

        <button onclick="removeItem(${index})" style="background:red;color:white;padding:5px;">
            Remove
        </button>
    </div>
    `;
});

    document.getElementById("total").innerText = "Total: ₹" + total;
}

loadCart();
</script>
</body>
</html>
